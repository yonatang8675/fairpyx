<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QP Local Search - Fair Allocation{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">Fair Allocation Demo</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Based on "Quasi-Polynomial Local Search for Restricted Max-Min Fair Allocation" by Polacek &amp; Svensson (2014)</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
